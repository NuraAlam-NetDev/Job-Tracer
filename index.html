<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Job Tracer</title>
    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <!-- Tailwind  -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
      * {
        font-family: "Inter", sans-serif;
      }
    </style>
  </head>
  <body>
    <header class="w-[80%] mx-auto pt-6">
      <h1 class="text-4xl font-bold">Job Application Tracker</h1>
      <div class="grid grid-cols-3 gap-8 p-3">
        <div>
          <p>Total</p>
          <p id="total">0</p>
        </div>
        <div>
          <p>Interview</p>
          <p id="interview">0</p>
        </div>
        <div>
          <p>Rejected</p>
          <p id="rejected">0</p>
        </div>
      </div>
    </header>
    <hr class="my-5" />
    <main class="w-[80%] mx-auto">
      <div class="flex justify-between py-3 mt-4">
        <h3>Available Jobs</h3>
        <p class="text-gray-500">0 <span>jobs</span></p>
      </div>
      <div>
        <button class="bg-blue-500 text-white px-3 rounded" id="all-filter-btn">
          All
        </button>
        <button
          class="bg-white text-gray-500 px-3 rounded"
          id="interview-filter-btn"
        >
          Interview
        </button>
        <button
          class="bg-white text-gray-500 px-3 rounded"
          id="rejected-filter-btn"
        >
          Rejected
        </button>
      </div>
      <section id="cards ">
        <div class="card flex justify-between  p-7 ">
          <div class="space-y-4">
            <div class="mb-5">
              <p class="text-black">Mobile First Corp</p>
              <p class="text-gray-500">React Native Developer</p>
              <p class="text-gray-500">
                Remote - Full-time - $130,000 - $175,000
              </p>
            </div>
            <div class="bg-gray-200 px-4 inline-block">
              <p class="status">NOT APPLIED</p>
            </div>
            <div>
              <p class="text-gray-800">
                Build cross-platform mobile applications using React Native.
                Work on products used by millions of users worldwide.
              </p>
            </div>

            <div>
              <button
                class="int-btn text-green-600 border border-green-600 px-3 py-1 bg-white rounded"
              >
                Interview
              </button>
              <button
                class="rej-btn text-red-600 border border-red-600 px-3 py-1 bg-white rounded"
              >
                Rejected
              </button>
            </div>
          </div>
          <div>
            <button class="delet-btn">
              <i class="fa-solid fa-trash-can text-gray-500"></i>
            </button>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
